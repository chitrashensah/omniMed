<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="g" x1="5" y1="4" x2="27" y2="28" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ff7759"/>
      <stop offset="1" stop-color="#1863dc"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="8" fill="#ffffff"/>
  <!-- network edges: center -> each model node -->
  <g stroke="url(#g)" stroke-width="1.3" opacity="0.5" stroke-linecap="round">
    <line x1="16" y1="16" x2="16"    y2="5"/>
    <line x1="16" y1="16" x2="25.53" y2="10.5"/>
    <line x1="16" y1="16" x2="25.53" y2="21.5"/>
    <line x1="16" y1="16" x2="16"    y2="27"/>
    <line x1="16" y1="16" x2="6.47"  y2="21.5"/>
    <line x1="16" y1="16" x2="6.47"  y2="10.5"/>
  </g>
  <!-- molecular hexagon -->
  <path d="M16 5 L25.53 10.5 L25.53 21.5 L16 27 L6.47 21.5 L6.47 10.5 Z"
        fill="none" stroke="url(#g)" stroke-width="2" stroke-linejoin="round"/>
  <!-- six model nodes -->
  <g fill="url(#g)">
    <circle cx="16"    cy="5"    r="2.1"/>
    <circle cx="25.53" cy="10.5" r="2.1"/>
    <circle cx="25.53" cy="21.5" r="2.1"/>
    <circle cx="16"    cy="27"   r="2.1"/>
    <circle cx="6.47"  cy="21.5" r="2.1"/>
    <circle cx="6.47"  cy="10.5" r="2.1"/>
  </g>
  <!-- central consensus node -->
  <circle cx="16" cy="16" r="3.4" fill="url(#g)"/>
  <circle cx="16" cy="16" r="1.5" fill="#fff"/>
</svg>
